<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Samarqand siluetida sariq taksi">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6ea6"/>
      <stop offset="0.42" stop-color="#6aa6cf"/>
      <stop offset="0.70" stop-color="#cfe6ea"/>
      <stop offset="1" stop-color="#f7dca0"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4d2"/>
      <stop offset="0.55" stop-color="#fde7b0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fde7b0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="plaza" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecdcb6"/>
      <stop offset="1" stop-color="#dcc89c"/>
    </linearGradient>
    <linearGradient id="domeT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37b3bd"/>
      <stop offset="1" stop-color="#1b8d99"/>
    </linearGradient>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc824"/>
      <stop offset="1" stop-color="#e6a300"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46627f"/>
      <stop offset="1" stop-color="#27384d"/>
    </linearGradient>
    <linearGradient id="tree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5d9447"/>
      <stop offset="1" stop-color="#356b2f"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect x="0" y="0" width="1000" height="660" fill="url(#sky)"/>
  <circle cx="730" cy="225" r="190" fill="url(#sun)"/>
  <circle cx="730" cy="225" r="66" fill="#fff3cf"/>

  <!-- birds -->
  <g stroke="#22425f" stroke-width="3.2" fill="none" stroke-linecap="round" opacity="0.65">
    <path d="M150,150 Q166,138 182,150 Q198,138 214,150"/>
    <path d="M236,196 Q248,187 260,196 Q272,187 284,196"/>
    <path d="M120,228 Q130,221 140,228 Q150,221 160,228"/>
  </g>

  <!-- distant haze hills -->
  <path d="M0,452 C140,418 250,440 360,452 C520,470 560,430 700,446 C820,458 920,440 1000,452 L1000,500 L0,500 Z" fill="#bcd2d8" opacity="0.85"/>

  <!-- ============ REGISTAN SILHOUETTE ============ -->
  <g>
    <!-- left minaret -->
    <rect x="244" y="286" width="28" height="184" fill="#ece2c8"/>
    <rect x="244" y="330" width="28" height="9" fill="#1f9aa6"/>
    <rect x="244" y="392" width="28" height="9" fill="#1f9aa6"/>
    <rect x="240" y="276" width="36" height="14" rx="3" fill="#ece2c8"/>
    <path d="M258,256 L266,276 L250,276 Z" fill="#e6b347"/>
    <!-- right minaret -->
    <rect x="728" y="286" width="28" height="184" fill="#ece2c8"/>
    <rect x="728" y="330" width="28" height="9" fill="#1f9aa6"/>
    <rect x="728" y="392" width="28" height="9" fill="#1f9aa6"/>
    <rect x="724" y="276" width="36" height="14" rx="3" fill="#ece2c8"/>
    <path d="M742,256 L750,276 L734,276 Z" fill="#e6b347"/>

    <!-- left dome pavilion -->
    <rect x="300" y="400" width="80" height="70" fill="#efe7d1"/>
    <rect x="300" y="400" width="80" height="70" fill="#000" opacity="0.05"/>
    <rect x="296" y="392" width="88" height="12" fill="#ddd0b1"/>
    <ellipse cx="340" cy="396" rx="46" ry="14" fill="#1b8d99"/>
    <path d="M298,396 C298,330 318,300 340,288 C362,300 382,330 382,396 Z" fill="url(#domeT)"/>
    <path d="M340,288 C328,300 312,332 312,396 M340,288 C352,300 368,332 368,396 M320,300 C314,332 300,360 300,396 M360,300 C366,332 380,360 380,396" stroke="#5ec3cc" stroke-width="2.4" fill="none" opacity="0.8"/>
    <rect x="335" y="270" width="10" height="20" fill="#e6b347"/>
    <circle cx="340" cy="266" r="7" fill="#e6b347"/>

    <!-- right dome pavilion -->
    <rect x="620" y="400" width="80" height="70" fill="#efe7d1"/>
    <rect x="620" y="400" width="80" height="70" fill="#000" opacity="0.05"/>
    <rect x="616" y="392" width="88" height="12" fill="#ddd0b1"/>
    <ellipse cx="660" cy="396" rx="46" ry="14" fill="#1b8d99"/>
    <path d="M618,396 C618,330 638,300 660,288 C682,300 702,330 702,396 Z" fill="url(#domeT)"/>
    <path d="M660,288 C648,300 632,332 632,396 M660,288 C672,300 688,332 688,396 M640,300 C634,332 620,360 620,396 M680,300 C686,332 700,360 700,396" stroke="#5ec3cc" stroke-width="2.4" fill="none" opacity="0.8"/>
    <rect x="655" y="270" width="10" height="20" fill="#e6b347"/>
    <circle cx="660" cy="266" r="7" fill="#e6b347"/>

    <!-- central iwan (big portal) -->
    <rect x="412" y="250" width="176" height="220" fill="#efe7d1"/>
    <rect x="412" y="250" width="176" height="220" fill="#000" opacity="0.04"/>
    <rect x="404" y="240" width="192" height="16" fill="#ddd0b1"/>
    <rect x="404" y="240" width="192" height="16" fill="#1f9aa6" opacity="0.25"/>
    <!-- pointed-arch recess -->
    <path d="M436,470 L436,348 C436,312 466,290 500,272 C534,290 564,312 564,348 L564,470 Z" fill="#13707c"/>
    <path d="M452,470 L452,352 C452,320 476,302 500,288 C524,302 548,320 548,352 L548,470 Z" fill="#0f5e69"/>
    <!-- doorway -->
    <path d="M474,470 L474,402 C474,388 486,378 500,372 C514,378 526,388 526,402 L526,470 Z" fill="#0a444c"/>
    <!-- corner finials -->
    <rect x="408" y="226" width="9" height="16" fill="#e6b347"/>
    <rect x="583" y="226" width="9" height="16" fill="#e6b347"/>
  </g>

  <!-- PLAZA / GROUND -->
  <rect x="0" y="470" width="1000" height="530" fill="url(#plaza)"/>
  <path d="M0,470 L1000,470 L1000,486 L0,486 Z" fill="#000" opacity="0.05"/>

  <!-- cypress trees (framing) -->
  <g>
    <path d="M168,556 C146,544 154,486 174,450 C194,486 202,544 180,556 Z" fill="url(#tree)"/>
    <rect x="171" y="552" width="6" height="14" fill="#6b4a2a"/>
    <path d="M838,560 C812,546 822,478 846,438 C870,478 880,546 854,560 Z" fill="url(#tree)"/>
    <rect x="843" y="556" width="6" height="16" fill="#6b4a2a"/>
  </g>

  <!-- ============ YELLOW TAXI (side view, facing right) ============ -->
  <g>
    <!-- ground shadow -->
    <ellipse cx="500" cy="876" rx="290" ry="30" fill="#000" opacity="0.14"/>

    <!-- cabin -->
    <path d="M392,752 L450,662 L606,662 L662,752 Z" fill="url(#body)"/>
    <!-- glass: rear (left) + front (right), split by pillar -->
    <path d="M428,746 L468,676 L516,676 L516,746 Z" fill="url(#glass)"/>
    <path d="M540,746 L540,676 L592,676 L626,746 Z" fill="url(#glass)"/>
    <path d="M468,676 L516,676 L516,690 L460,690 Z" fill="#ffffff" opacity="0.12"/>

    <!-- lower body -->
    <path d="M236,846
             L766,846
             C780,846 790,838 790,820
             L790,786
             C790,766 778,756 758,754
             L662,752 L392,752 L300,756
             C250,760 214,772 212,800
             L210,824
             C209,840 220,846 236,846 Z" fill="url(#body)"/>

    <!-- door seams + handles -->
    <path d="M516,752 L516,832" stroke="#c98f00" stroke-width="3" opacity="0.6"/>
    <path d="M392,754 L392,830" stroke="#c98f00" stroke-width="3" opacity="0.5"/>
    <rect x="436" y="784" width="26" height="7" rx="3.5" fill="#c98f00"/>
    <rect x="556" y="784" width="26" height="7" rx="3.5" fill="#c98f00"/>

    <!-- checker stripe -->
    <g>
      <rect x="232" y="800" width="560" height="22" fill="#f4f4f4" opacity="0.0"/>
      <g fill="#1c1c22">
        <rect x="248" y="801" width="20" height="11"/><rect x="288" y="801" width="20" height="11"/>
        <rect x="328" y="801" width="20" height="11"/><rect x="368" y="801" width="20" height="11"/>
        <rect x="408" y="801" width="20" height="11"/><rect x="448" y="801" width="20" height="11"/>
        <rect x="488" y="801" width="20" height="11"/><rect x="528" y="801" width="20" height="11"/>
        <rect x="568" y="801" width="20" height="11"/><rect x="608" y="801" width="20" height="11"/>
        <rect x="648" y="801" width="20" height="11"/><rect x="688" y="801" width="20" height="11"/>
        <rect x="268" y="812" width="20" height="11"/><rect x="308" y="812" width="20" height="11"/>
        <rect x="348" y="812" width="20" height="11"/><rect x="388" y="812" width="20" height="11"/>
        <rect x="428" y="812" width="20" height="11"/><rect x="468" y="812" width="20" height="11"/>
        <rect x="508" y="812" width="20" height="11"/><rect x="548" y="812" width="20" height="11"/>
        <rect x="588" y="812" width="20" height="11"/><rect x="628" y="812" width="20" height="11"/>
        <rect x="668" y="812" width="20" height="11"/>
      </g>
    </g>

    <!-- rocker shadow -->
    <path d="M236,840 L766,840 C772,840 778,838 782,832 L218,832 C222,838 230,840 236,840 Z" fill="#000" opacity="0.18"/>

    <!-- headlight (front/right) + taillight (rear/left) -->
    <path d="M790,792 L790,812 C786,812 778,808 776,800 C778,794 784,792 790,792 Z" fill="#fff6d6"/>
    <path d="M210,794 L210,814 C214,814 222,810 224,802 C222,796 216,794 210,794 Z" fill="#e0492f"/>

    <!-- side mirror -->
    <path d="M610,742 L632,742 L636,758 L612,756 Z" fill="url(#body)"/>

    <!-- roof TAXI sign -->
    <rect x="494" y="636" width="64" height="26" rx="6" fill="#15151b"/>
    <rect x="500" y="641" width="52" height="16" rx="3" fill="#ffd23f"/>
    <text x="526" y="654" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#15151b" text-anchor="middle">TAXI</text>

    <!-- wheels -->
    <g>
      <circle cx="352" cy="820" r="56" fill="#1b1b21"/>
      <circle cx="352" cy="820" r="30" fill="#c3c7cf"/>
      <circle cx="352" cy="820" r="11" fill="#7e8590"/>
      <circle cx="648" cy="820" r="56" fill="#1b1b21"/>
      <circle cx="648" cy="820" r="30" fill="#c3c7cf"/>
      <circle cx="648" cy="820" r="11" fill="#7e8590"/>
    </g>
  </g>
</svg>
