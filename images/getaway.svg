<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="O'zbekiston shahar manzarasi, sayohat mavzusi">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6ea6"/>
      <stop offset="0.45" stop-color="#6aa6cf"/>
      <stop offset="0.74" stop-color="#cfe6ea"/>
      <stop offset="1" stop-color="#f7dca0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="1" r="0.7">
      <stop offset="0" stop-color="#ffeec0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffeec0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4d089"/>
      <stop offset="1" stop-color="#e7b25c"/>
    </linearGradient>
    <linearGradient id="dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#37b3bd"/>
      <stop offset="1" stop-color="#1b8d99"/>
    </linearGradient>
    <linearGradient id="glassA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a9c9e6"/>
      <stop offset="1" stop-color="#6f9cc8"/>
    </linearGradient>
    <linearGradient id="glassB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe0ef"/>
      <stop offset="1" stop-color="#9bbbda"/>
    </linearGradient>
  </defs>

  <!-- SKY -->
  <rect x="0" y="0" width="1200" height="560" fill="url(#sky)"/>
  <ellipse cx="600" cy="540" rx="520" ry="150" fill="url(#glow)"/>

