    <rect x="732" y="430" width="26" height="216" fill="#ece2c8"/>
    <rect x="732" y="476" width="26" height="9" fill="#1f9aa6"/>
    <rect x="732" y="540" width="26" height="9" fill="#1f9aa6"/>
    <rect x="728" y="420" width="34" height="12" rx="3" fill="#ece2c8"/>
