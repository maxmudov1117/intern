    <path d="M210,150 Q224,140 238,150 Q252,140 266,150"/>
    <path d="M300,120 Q311,112 322,120 Q333,112 344,120"/>
  </g>

  <!-- AIRPLANE -->
  <g transform="translate(815,165) rotate(-20)">
    <path d="M-5,-8 L-50,-46 L-31,-48 L8,-9 Z" fill="#f5efe0"/>
    <path d="M-5,8 L-50,46 L-31,48 L8,9 Z" fill="#e8e0cd"/>
    <path d="M-46,-7 L-68,-27 L-57,-28 L-40,-7 Z" fill="#f5efe0"/>
    <path d="M-46,7 L-68,27 L-57,28 L-40,7 Z" fill="#e8e0cd"/>
    <ellipse cx="0" cy="0" rx="64" ry="12" fill="#f5efe0"/>
    <path d="M62,-7 L62,7 L84,0 Z" fill="#f5efe0"/>
    <path d="M-64,0 L-44,0 L-50,-3 Z" fill="#ddd2bb"/>
    <rect x="40" y="-3" width="26" height="6" rx="3" fill="#e8762f"/>
    <path d="M-50,-46 L-44,-46 L-40,-9 L-46,-9 Z" fill="#e0492f"/>
  </g>

  <!-- MOUNTAINS -->
  <path d="M0,470 L140,408 L250,452 L360,400 L470,448 L560,410 L700,456 L820,412 L940,452 L1060,414 L1200,456 L1200,520 L0,520 Z" fill="#3a5478"/>
  <path d="M0,492 L120,452 L260,486 L380,448 L520,488 L640,452 L780,490 L900,456 L1040,490 L1160,460 L1200,486 L1200,560 L0,560 Z" fill="#243a5c"/>

  <!-- WATER -->
  <rect x="0" y="500" width="1200" height="120" fill="url(#water)"/>
  <g stroke="#f7dca0" stroke-width="3" opacity="0.6" stroke-linecap="round">
    <path d="M80,556 L240,556"/><path d="M820,548 L980,548"/><path d="M500,566 L640,566"/>
  </g>
  <path d="M0,500 L1200,500 L1200,512 L0,512 Z" fill="#fff" opacity="0.15"/>

