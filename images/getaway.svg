    <g stroke="#5e86b0" stroke-width="2" opacity="0.6">
      <path d="M338,430 H396"/><path d="M338,470 H396"/><path d="M338,510 H396"/><path d="M338,550 H396"/><path d="M338,590 H396"/>
      <path d="M357,398 V646"/><path d="M376,398 V646"/>
    </g>
    <rect x="338" y="398" width="14" height="248" fill="#fff" opacity="0.18"/>

