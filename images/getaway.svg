  <!-- ============ FOREGROUND FOLIAGE ============ -->
  <g>
    <!-- dark base band -->
    <path d="M0,700 C120,650 240,690 360,672 C520,648 640,700 800,676 C960,652 1080,694 1200,668 L1200,900 L0,900 Z" fill="#2e5e2a"/>
    <!-- mid green mounds -->
    <g fill="#43743a">
      <circle cx="90" cy="712" r="74"/><circle cx="170" cy="700" r="64"/><circle cx="250" cy="720" r="70"/>
      <circle cx="430" cy="710" r="76"/><circle cx="520" cy="700" r="62"/><circle cx="610" cy="722" r="72"/>
      <circle cx="800" cy="708" r="74"/><circle cx="890" cy="700" r="60"/><circle cx="990" cy="720" r="72"/><circle cx="1110" cy="710" r="74"/>
      <circle cx="340" cy="730" r="60"/><circle cx="700" cy="730" r="58"/><circle cx="1040" cy="732" r="56"/>
    </g>
    <!-- light highlights -->
    <g fill="#5d9447">
      <circle cx="80" cy="700" r="44"/><circle cx="240" cy="706" r="42"/><circle cx="420" cy="698" r="46"/>
      <circle cx="600" cy="708" r="42"/><circle cx="790" cy="696" r="46"/><circle cx="980" cy="708" r="42"/><circle cx="1100" cy="698" r="44"/>
    </g>
    <g fill="#74a84e" opacity="0.85">
      <circle cx="72" cy="690" r="22"/><circle cx="412" cy="688" r="24"/><circle cx="782" cy="686" r="24"/><circle cx="1092" cy="688" r="22"/>
    </g>
    <rect x="0" y="820" width="1200" height="80" fill="#2e5e2a"/>
  </g>
