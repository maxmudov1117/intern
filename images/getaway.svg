    <g stroke="#5e86b0" stroke-width="2" opacity="0.6">
      <path d="M546,390 H616"/><path d="M546,426 H616"/><path d="M546,462 H616"/><path d="M546,498 H616"/><path d="M546,534 H616"/><path d="M546,570 H616"/><path d="M546,606 H616"/>
