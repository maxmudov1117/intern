      <rect x="272" y="506" width="12" height="14"/><rect x="292" y="506" width="12" height="14"/><rect x="312" y="506" width="8" height="14"/>
      <rect x="272" y="532" width="12" height="14"/><rect x="292" y="532" width="12" height="14"/><rect x="312" y="532" width="8" height="14"/>
      <rect x="272" y="558" width="12" height="14"/><rect x="292" y="558" width="12" height="14"/><rect x="312" y="558" width="8" height="14"/>
