      <rect x="860" y="492" width="11" height="13"/><rect x="879" y="492" width="11" height="13"/><rect x="898" y="492" width="6" height="13"/>
      <rect x="860" y="516" width="11" height="13"/><rect x="879" y="516" width="11" height="13"/><rect x="898" y="516" width="6" height="13"/>
      <rect x="860" y="540" width="11" height="13"/><rect x="879" y="540" width="11" height="13"/><rect x="898" y="540" width="6" height="13"/>
