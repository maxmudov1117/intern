    <path d="M470,320 L532,320 L536,646 L466,646 Z" fill="url(#glassB)"/>
    <g stroke="#7ea1c4" stroke-width="2" opacity="0.6">
      <path d="M468,360 H534"/><path d="M467,400 H535"/><path d="M467,440 H536"/><path d="M466,480 H536"/><path d="M466,520 H537"/><path d="M465,560 H537"/><path d="M465,600 H538"/>
      <path d="M489,322 V646"/><path d="M512,320 V646"/>
    </g>
    <rect x="470" y="320" width="16" height="326" fill="#fff" opacity="0.20"/>
    <rect x="496" y="300" width="10" height="22" fill="#cfd8e0"/>
    <circle cx="501" cy="296" r="5" fill="#e6b347"/>

