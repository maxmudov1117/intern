      <path d="M799,392 V646"/><path d="M819,392 V646"/>
    </g>
    <rect x="778" y="392" width="14" height="254" fill="#fff" opacity="0.18"/>

    <rect x="850" y="452" width="56" height="194" fill="#efe7d1"/>
    <g fill="#41648a" opacity="0.55">
