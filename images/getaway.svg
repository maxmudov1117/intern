    <rect x="636" y="540" width="74" height="106" fill="#efe7d1"/>
    <rect x="630" y="532" width="86" height="12" fill="#ddd0b1"/>
    <ellipse cx="673" cy="536" rx="44" ry="13" fill="#1b8d99"/>
    <path d="M629,536 C629,476 648,448 673,436 C698,448 717,476 717,536 Z" fill="url(#dome)"/>
    <path d="M673,436 C661,448 645,478 645,536 M673,436 C685,448 701,478 701,536 M653,448 C647,478 633,500 633,536 M693,448 C699,478 713,500 713,536" stroke="#5ec3cc" stroke-width="2.2" fill="none" opacity="0.8"/>
    <rect x="668" y="418" width="10" height="18" fill="#e6b347"/>
    <circle cx="673" cy="414" r="6" fill="#e6b347"/>

