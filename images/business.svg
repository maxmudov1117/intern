<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shisha minora oldida ko'cha, taksiga chiqayotgan ishbilarmon ayol">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f6ea6"/>
      <stop offset="0.42" stop-color="#6aa6cf"/>
      <stop offset="0.72" stop-color="#cfe6ea"/>
      <stop offset="1" stop-color="#f3e3c0"/>
    </linearGradient>
    <linearGradient id="glass" x1="0.1" y1="0" x2="0.7" y2="1">
      <stop offset="0" stop-color="#9cc1e6"/>
      <stop offset="0.5" stop-color="#5f8cc0"/>
      <stop offset="1" stop-color="#3a679a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e6c2"/>
      <stop offset="1" stop-color="#e2cb94"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f3ec"/>
      <stop offset="1" stop-color="#cfd8e1"/>
    </linearGradient>
    <clipPath id="towerClip"><polygon points="0,-20 584,96 300,1020 -20,1020"/></clipPath>
  </defs>

  <!-- SKY -->
  <rect x="0" y="0" width="1000" height="1000" fill="url(#sky)"/>

  <!-- distant skyline -->
  <g fill="#9bb8d0" opacity="0.9">
    <rect x="636" y="492" width="34" height="74"/>
    <rect x="678" y="468" width="24" height="98"/>
    <rect x="712" y="508" width="40" height="58"/>
    <rect x="762" y="478" width="26" height="88"/>
    <rect x="800" y="500" width="34" height="66"/>
    <rect x="846" y="462" width="22" height="104"/>
    <rect x="878" y="510" width="44" height="56"/>
    <rect x="930" y="486" width="28" height="80"/>
    <!-- tiny dome (Uzbek nod) -->
    <path d="M738,508 C738,488 748,478 758,474 C768,478 778,488 778,508 Z"/>
  </g>
  <g fill="#7ea1c4" opacity="0.55">
    <path d="M620,566 L1000,566 L1000,540 C880,520 760,548 620,540 Z"/>
  </g>

  <!-- AIRPLANE (gold) -->
  <g transform="translate(862,212) rotate(-18)">
    <path d="M-5,-8 L-50,-46 L-31,-48 L8,-9 Z" fill="#e8b84b"/>
    <path d="M-5,8 L-50,46 L-31,48 L8,9 Z" fill="#d3a236"/>
    <path d="M-46,-7 L-68,-27 L-57,-28 L-40,-7 Z" fill="#e8b84b"/>
    <path d="M-46,7 L-68,27 L-57,28 L-40,7 Z" fill="#d3a236"/>
    <ellipse cx="0" cy="0" rx="64" ry="12" fill="#ecc05a"/>
    <path d="M62,-7 L62,7 L84,0 Z" fill="#ecc05a"/>
    <rect x="40" y="-3" width="24" height="6" rx="3" fill="#b9842a"/>
  </g>

  <!-- ============ GROUND / STREET ============ -->
  <polygon points="1020,540 1020,1020 200,1020 558,548" fill="url(#ground)"/>
  <!-- road band -->
  <polygon points="1020,612 1020,1020 470,1020 640,604" fill="#e6d3a4"/>
  <polygon points="1020,612 1020,648 690,604 700,592" fill="#f2e7c8" opacity="0.7"/>
  <!-- curb highlight -->
  <path d="M558,548 L1020,540" stroke="#fff" stroke-width="3" opacity="0.3"/>

  <!-- distant cars on road -->
  <g>
    <rect x="612" y="586" width="40" height="18" rx="7" fill="#c25a2a"/>
    <rect x="664" y="582" width="34" height="15" rx="6" fill="#cfd8e1"/>
  </g>

  <!-- ============ WARM TERRACES (lower center) ============ -->
  <g>
    <polygon points="300,820 560,820 600,872 286,872" fill="#e89a55"/>
    <polygon points="300,820 560,820 560,832 300,832" fill="#f4d9a8" opacity="0.7"/>
    <polygon points="286,900 600,900 640,958 264,958" fill="#efb878"/>
    <polygon points="286,900 600,900 600,912 286,912" fill="#f6e2b6" opacity="0.7"/>
    <!-- green strips -->
    <polygon points="320,876 470,876 478,896 310,896" fill="#5d9447"/>
    <polygon points="300,962 520,962 528,994 286,994" fill="#4f8a3c"/>
    <!-- tiny figures with bags -->
    <g>
      <circle cx="372" cy="852" r="7" fill="#2a2438"/>
      <rect x="366" y="858" width="12" height="22" rx="4" fill="#2a2438"/>
      <rect x="380" y="864" width="7" height="14" rx="2" fill="#1c1726"/>
      <circle cx="446" cy="848" r="7" fill="#4a7a3a"/>
      <rect x="440" y="854" width="12" height="22" rx="4" fill="#3f6a32"/>
      <circle cx="520" cy="930" r="8" fill="#c25a2a"/>
      <rect x="513" y="938" width="14" height="24" rx="4" fill="#a84a22"/>
    </g>
    <!-- tiny car on a level -->
    <rect x="330" y="916" width="48" height="20" rx="8" fill="#cfd8e1"/>
    <rect x="338" y="912" width="30" height="9" rx="4" fill="#aab4c0"/>
  </g>

  <!-- ============ GLASS TOWER (left, leaning) ============ -->
  <polygon points="0,-20 584,96 300,1020 -20,1020" fill="url(#glass)"/>
  <g clip-path="url(#towerClip)">
    <!-- reflection panels -->
    <polygon points="0,-20 584,96 360,560 0,360" fill="#aecdec" opacity="0.35"/>
    <polygon points="120,520 420,640 300,1020 60,900" fill="#2f5680" opacity="0.4"/>
    <!-- vertical bay lines -->
    <g stroke="#2e5378" stroke-width="2.5" opacity="0.55">
      <path d="M83,-3 L26,1020"/><path d="M167,13 L71,1020"/><path d="M250,30 L117,1020"/>
      <path d="M334,46 L163,1020"/><path d="M417,63 L209,1020"/><path d="M501,79 L254,1020"/>
    </g>
    <!-- horizontal floor lines -->
    <g stroke="#2e5378" stroke-width="2" opacity="0.4">
      <path d="M-2,84 L555,189"/><path d="M-4,188 L527,281"/><path d="M-6,292 L498,374"/>
      <path d="M-8,396 L470,466"/><path d="M-10,500 L441,558"/><path d="M-12,604 L413,651"/>
      <path d="M-14,708 L384,743"/><path d="M-16,812 L356,836"/>
    </g>
    <!-- X cross-bracing -->
    <g stroke="#cfe2f5" stroke-width="6" opacity="0.7" stroke-linecap="round">
      <path d="M40,120 L520,510"/><path d="M40,510 L470,150"/>
      <path d="M60,540 L440,900"/><path d="M60,900 L420,560"/>
    </g>
    <!-- bright edge highlight along the diagonal -->
    <path d="M584,96 L300,1020" stroke="#dcebf8" stroke-width="5" opacity="0.7"/>
  </g>

  <!-- ============ WHITE CAR + BUSINESSWOMAN (right) ============ -->
  <g>
    <!-- car shadow -->
    <ellipse cx="822" cy="676" rx="178" ry="22" fill="#000" opacity="0.12"/>

    <!-- car body (side, facing right) -->
    <path d="M664,640 L972,640 C982,640 988,632 988,620 L988,596
             C988,580 978,572 962,570 L876,568 L726,566 L686,572
             C654,576 638,584 636,606 L634,624 C633,636 648,640 664,640 Z" fill="url(#carBody)"/>
    <!-- cabin -->
    <path d="M724,568 L770,512 L876,512 L908,566 Z" fill="#dfe6ee"/>
    <!-- glass -->
    <path d="M742,564 L778,520 L818,520 L818,564 Z" fill="#27313e"/>
    <path d="M834,564 L834,520 L872,520 L898,564 Z" fill="#27313e"/>
    <!-- open rear door (swung toward viewer) -->
    <path d="M724,572 L724,640 L690,648 L686,576 Z" fill="#e7edf3"/>
    <path d="M724,572 L724,640" stroke="#b9c4d0" stroke-width="2"/>
    <!-- details -->
    <path d="M664,632 L962,632" stroke="#b3bdc8" stroke-width="3" opacity="0.7"/>
    <path d="M988,600 L988,616 C984,616 978,612 976,606 C978,600 982,598 988,600 Z" fill="#fdeccb"/>
    <!-- wheels -->
    <circle cx="724" cy="640" r="40" fill="#1c1c24"/>
    <circle cx="724" cy="640" r="21" fill="#aeb4bd"/>
    <circle cx="724" cy="640" r="7" fill="#6f757f"/>
    <circle cx="916" cy="640" r="40" fill="#1c1c24"/>
    <circle cx="916" cy="640" r="21" fill="#aeb4bd"/>
    <circle cx="916" cy="640" r="7" fill="#6f757f"/>

    <!-- businesswoman (standing by door) -->
    <g>
      <!-- legs/skirt -->
      <path d="M642,588 L676,588 L672,664 L648,664 Z" fill="#2e4a86"/>
      <rect x="645" y="660" width="11" height="20" fill="#1c1726"/>
      <rect x="662" y="660" width="11" height="20" fill="#1c1726"/>
      <!-- blazer torso -->
      <path d="M636,520 C636,506 648,498 658,498 C672,498 684,508 684,524 L680,592 L640,592 Z" fill="#3a5fa8"/>
      <!-- arm reaching to door -->
      <path d="M680,528 C700,532 716,544 720,560 C712,566 700,562 692,552 C686,544 680,536 676,530 Z" fill="#3a5fa8"/>
      <!-- briefcase -->
      <rect x="618" y="566" width="26" height="34" rx="4" fill="#2a2030"/>
      <rect x="624" y="560" width="14" height="8" rx="3" fill="#2a2030"/>
      <!-- head + hair -->
      <circle cx="660" cy="480" r="20" fill="#c98a5e"/>
      <path d="M640,476 C640,458 650,448 660,448 C672,448 682,460 682,478 C682,490 678,498 672,502 L676,520 L646,520 L650,500 C644,496 640,488 640,476 Z" fill="#e0b85a"/>
    </g>
  </g>

  <!-- ============ FOREGROUND FIGURES ============ -->
  <g>
    <circle cx="470" cy="958" r="13" fill="#2a2438"/>
    <path d="M456,968 C456,962 484,962 484,968 L480,1000 L460,1000 Z" fill="#2a2438"/>
    <rect x="486" y="978" width="12" height="22" rx="3" fill="#1c1726"/>
    <circle cx="540" cy="978" r="12" fill="#1f1b2e"/>
    <path d="M527,988 C527,982 553,982 553,988 L550,1000 L530,1000 Z" fill="#1f1b2e"/>
  </g>
</svg>
